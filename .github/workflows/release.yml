# Tag-triggered release: shipping a version == pushing a `v*` tag.
#
# Flow: `git tag vX.Y.Z && git push origin vX.Y.Z` -> this workflow runs
# goreleaser, which cross-compiles the static binaries (per .goreleaser.yaml)
# and creates the GitHub Release with all archives + the checksums file.
#
# This is the ONLY automated path that publishes a release. `sprint-NNN-complete`
# tags are harness checkpoints and do NOT match `v*`, so they never trigger this.
#
# Not locally reproducible: the tag-push -> CI trigger requires a push to GitHub.
# `goreleaser release --snapshot --clean` is the offline proof the pipeline
# assembles correctly (it publishes nothing).
name: release

on:
  push:
    tags:
      - "v*"

# goreleaser needs write access to Contents to create the GitHub Release and
# upload the release assets. Nothing else is granted.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history (and tags) so goreleaser can build the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Pinned to the toolchain in go.mod (toolchain go1.26.3).
          go-version: "1.26.3"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Provided automatically by Actions; goreleaser uses it to create the
          # Release and upload assets to gitpcl/ant.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
