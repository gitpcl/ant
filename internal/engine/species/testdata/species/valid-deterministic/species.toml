name        = "unused-import"
description = "Removes imports that are never referenced"
severity    = "low"
languages   = ["go", "ts"]
auto_apply  = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind      = "deterministic"
transform = "delete-match"

[verify]
checks = ["compile", "detector-clears"]
