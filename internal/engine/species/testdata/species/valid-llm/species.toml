name        = "n+1-query"
description = "Detects 1+N query patterns in loops"
severity    = "high"
languages   = ["go", "ts"]
auto_apply  = false

[detect]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
