name        = "ai-slop"
description = "Fuzzy classifier for low-signal AI-generated boilerplate; ships disabled"
severity    = "low"
languages   = ["go", "ts"]
auto_apply  = false
enabled     = false

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
