name        = "black-format"
description = "Runs `black` over drifted Python files and stages the reformatted result; ships disabled (overlaps ruff-format)"
severity    = "low"
languages   = ["py"]
auto_apply  = true
enabled     = false

[detector]
kind = "ast-grep"
rule = "detect.yml"

# Tool-runner fix (Sprint 017, reused by Sprint 024 Python wave): exec `black` on
# a scratch copy and capture the reformatted file. DECLARATIVE command, like
# formatter-drift names gofmt and ruff-format names `ruff format`. The fixture
# overrides this with a FAKE formatter on PATH so CI needs no real black. This
# species SHIPS DISABLED by default (enabled = false above): `ruff format` is a
# Black-compatible formatter, so the two overlap — a project enables ONE of
# ruff-format / black-format, not both (exactly as php-cs-fixer ships disabled
# because it overlaps Pint).
[fix]
kind    = "tool"
command = "black"
args    = ["{file}"]
timeout = "60s"

# formatter-idempotence is the ONLY gate (same rationale as ruff-format): on a
# non-Go repo the Go-build compile gate is a vacuous pass (sprint-024 contract),
# and a formatter does not remove the marker the detector matched (so
# detector-clears is the wrong gate). Real proof = the formatter converges on a
# second run, gated by RequiredTools=["python3","black"] for the CI skip.
[verify]
checks = ["formatter-idempotence"]

[verify.tool]
command = "black"
args    = ["--check", "{file}"]
