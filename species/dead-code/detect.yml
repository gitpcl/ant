# Detector rule for the dead-code species (deterministic, ADR-0002).
#
# ast-grep is a SYNTACTIC matcher (TECHSPEC §2) and cannot perform whole-program
# reachability analysis, so the species targets a declaration EXPLICITLY MARKED
# dead with a `//ant:dead-code` doc comment — the same convention shape Go itself
# uses for tool directives (`//go:build`, `//lint:ignore`). A developer or an
# upstream pass annotates a provably-unreferenced unexported declaration; this
# species mechanically removes it.
#
# The matched node is a TOP-LEVEL function declaration immediately following an
# `//ant:dead-code` comment. Matching the whole `func` (which begins at column 0)
# means the captured text is the declaration verbatim, so the deterministic
# delete-match fix deletes exactly those lines. The verifier gate makes removal
# safe: `compile` rebuilds the patched tree (a still-referenced function would
# break the build and the fix is skipped — TECHSPEC §5.3) and `detector-clears`
# re-runs this rule and requires zero matches afterward.
id: dead-code
language: go
severity: warning
message: 'Declaration marked //ant:dead-code is unreferenced and can be removed'
rule:
  pattern: |
    func $NAME($$$PARAMS) $RET {
      $$$BODY
    }
  follows:
    kind: comment
    regex: 'ant:dead-code'
---
# Sprint 025 js-multilang-backfill: the JavaScript analog of a marked dead Go
# `func` is a marked top-level `function` declaration. `language: javascript` fires
# on .js/.jsx so the shared species now removes a marked dead function in plain
# JavaScript too. The existing Go `.go` doc above is a separate `---` document and
# is untouched. Trust is unchanged (delete-match + the species' verify gate); on a
# JS repo `compile` is a vacuous Go-build pass, so detector-clears is the proof.
id: dead-code-js
language: javascript
severity: warning
message: 'Declaration marked //ant:dead-code is unreferenced and can be removed'
rule:
  pattern: |
    function $NAME($$$PARAMS) {
      $$$BODY
    }
  follows:
    kind: comment
    regex: 'ant:dead-code'
