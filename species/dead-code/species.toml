name        = "dead-code"
description = "Removes mechanically-unreachable or unused code"
severity    = "low"
languages   = ["go", "ts"]
auto_apply  = true
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind      = "deterministic"
transform = "delete-match"

[verify]
checks = ["compile", "detector-clears"]
