name        = "duplicate-ci-step"
description = "REPORTS a CI `run:` step that repeats across jobs in a workflow — a possible consolidation candidate. Report-only (no code change): cross-job repetition usually CANNOT be safely auto-removed because each job runs on an isolated runner, so deleting the step strips required setup/build. Ships DISABLED by default; enable per-project in ant.toml."
severity    = "low"
languages   = ["yaml"]
auto_apply  = false
enabled     = false

# REPORT-ONLY (fix.kind = "none"). The detector flags a `- run:` command that
# appears in more than one job; `ant scout` reports it as a low-severity
# consolidation candidate and changes NOTHING in the working tree (TECHSPEC §2).
# It declares no [fix].transform and no [verify].checks — `ant fix` rejects a
# report-only species with a clear message.
#
# WHY report-only, not a deterministic fix: GitHub Actions jobs run on SEPARATE,
# isolated runners and do not share a filesystem across `needs:`. A `run: pnpm
# install` / `run: pnpm build` repeated in a build job and a deploy job is usually
# REQUIRED, not redundant — deleting it leaves the deploy job with no dependencies
# and no build output. The earlier delete-match fix removed the repeated line and
# broke exactly this (a real deploy that ran `pages deploy dist` against a dist/
# that was never built). A correct consolidation — artifact upload/download, a
# reusable workflow, or a composite action — is a human judgement call, not a line
# deletion. So Ant reports the smell and leaves remediation to a human. Ships
# disabled by default because cross-job repetition is frequently intentional;
# enable it per-project where consolidation is genuinely wanted.

[detector]
kind        = "command"
script      = "detect.sh"
interpreter = "sh"

[fix]
kind = "none"
