name        = "duplicate-code-small"
description = "Detects a small repeated block duplicated across functions (a locally-computed value clamped the same way in two places) and proposes extracting a shared helper; see detect.yml. Propose-only (the verified-refactor showcase)."
severity    = "low"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
