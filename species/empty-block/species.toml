name        = "empty-block"
description = "Flags an empty if/else/for/while/catch/function body marked //ant:empty-block (propose-only)"
severity    = "low"
languages   = ["ts"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind      = "deterministic"
transform = "delete-match"

[verify]
checks = ["compile", "detector-clears"]
