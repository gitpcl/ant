name        = "fastapi-depends-default-arg"
description = "Flags a mutable default argument (= [] / = {}) on a FastAPI handler/dependency; propose-only"
severity    = "medium"
languages   = ["py"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

# LLM-assisted fix (templated on n+1-query): replace the shared-mutable default
# with the safe `= None` sentinel + an in-body initializer (or, for an injected
# dependency, a proper `Depends(...)` default). The correct replacement depends on
# how the parameter is used, so the fix is a judgement the model makes —
# propose-only.
[fix]
kind   = "llm"
prompt = "fix.md"

# detector-clears re-runs THIS rule over the patched scratch tree and requires
# zero matches (no mutable default remains). command:verify.sh runs `python -m
# py_compile` so a rewrite that broke the syntax is skipped. `compile`/
# `tests:affected` are DELIBERATELY OMITTED: on a non-Go repo the Go-build compile
# gate is a vacuous pass (sprint-024 contract). Real proof = detector-clears +
# py_compile, gated by RequiredTools=["python3"] for the CI skip.
[verify]
checks      = ["detector-clears", "command:verify.sh"]
interpreter = "sh"
