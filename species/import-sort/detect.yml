# Detector rule for the import-sort species (tool-runner fix — Sprint 017 P2
# orchestration wave; auto_apply).
#
# Like formatter-drift, this is an ORCHESTRATION species: the external import
# organizer (goimports/isort/prettier) does the work, gated by
# formatter-idempotence + compile. ast-grep cannot decide "are these imports in
# canonical order"; it only NOMINATES a file for organizing. The rule matches a Go
# `import ( ... )` group the author marked with an `//ant:import-sort` doc comment
# (the established marker convention).
#
# After the tool-runner sorts the group, formatter-idempotence re-runs the
# organizer and requires zero further changes (a non-deterministic organizer
# FAILS — a trust signal), and compile rebuilds the patched tree. detector-clears
# is NOT used: sorting reorders lines, it does not remove the marked import group,
# so re-detect is the wrong gate.
id: import-sort
language: go
severity: info
message: 'Import group marked //ant:import-sort is not in canonical order; organizing imports'
rule:
  pattern: |
    import (
      $$$SPECS
    )
  follows:
    kind: comment
    regex: 'ant:import-sort'
---
# Sprint 025 js-multilang-backfill: JavaScript has no parenthesized `import ( ... )`
# group (the Go shape above); its imports are a run of `import ... from "..."`
# statements. The JS doc NOMINATES a file by matching the first marked import
# statement following an `//ant:import-sort` doc comment — exactly the file-nomination
# role the Go doc plays (the external organizer, e.g. prettier-plugin-organize-imports
# / eslint import/order, does the actual sorting over the whole file). `language:
# javascript` fires on .js/.jsx. After the tool sorts, formatter-idempotence is the
# proof; detector-clears is NOT used (sorting does not remove the marker).
id: import-sort-js
language: javascript
severity: info
message: 'Import block marked //ant:import-sort is not in canonical order; organizing imports'
rule:
  pattern: import $WHAT from "$PKG"
  follows:
    kind: comment
    regex: 'ant:import-sort'
