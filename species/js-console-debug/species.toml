name        = "js-console-debug"
description = "Flags statement-level console.log / console.debug / debugger left in JS/TS source; propose-only"
severity    = "low"
languages   = ["ts", "js"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind      = "deterministic"
transform = "delete-match"

# detector-clears re-runs THIS rule over the patched scratch tree and requires
# zero matches (no console.log/debug/debugger statement remains). command:verify.sh
# runs `tsc --noEmit` so a delete that broke the syntax is skipped. compile/
# tests:affected are DELIBERATELY OMITTED — on a JS/TS repo the hardcoded Go-build
# compile gate is a vacuous pass (sprint-025 contract). Real proof = detector-clears
# + tsc --noEmit, gated by RequiredTools=["node","tsc"] for the CI skip.
[verify]
checks      = ["detector-clears", "command:verify.sh"]
interpreter = "sh"
