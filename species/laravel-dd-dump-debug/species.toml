name        = "laravel-dd-dump-debug"
description = "Flags statement-level dd()/dump()/ray() debug calls left in Laravel source; propose-only"
severity    = "low"
languages   = ["php"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

# Deterministic delete-match (templated on Go's trailing-debug-code): the matched
# statement IS the smell, so the fix removes the verbatim matched line. No model.
[fix]
kind      = "deterministic"
transform = "delete-match"

# detector-clears re-runs THIS rule over the patched scratch tree and requires
# zero matches (the dd/dump/ray statement is gone). `compile` is now the genuine
# PHP parse gate: Sprint 026 made the built-in compile verifier per-language, so
# for a `languages = ["php"]` species it runs `php -l` over the changed PHP in the
# scratch tree (replacing the bespoke command:verify.sh this species carried as a
# workaround for the old vacuous Go-build compile check). A removal that left a
# syntax error makes php -l exit non-zero and the fix is skipped; php absent is an
# honest, clean SKIP (CI without php stays green), not a failure — so the
# command:verify.sh + RequiredTools=["php"] dance is no longer needed.
[verify]
checks = ["detector-clears", "compile"]
