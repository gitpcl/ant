name        = "laravel-env-call"
description = "Flags env('X') called outside the config/ dir (breaks php artisan config:cache); propose-only"
severity    = "medium"
languages   = ["php"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

# LLM-assisted fix (templated on n+1-query): replace the env() read with a
# config('x.y') read so it survives config caching. The correct config key is a
# judgement the model makes from context, so the fix is propose-only.
[fix]
kind   = "llm"
prompt = "fix.md"

# detector-clears re-runs THIS rule over the patched scratch tree and requires
# zero matches (no env() call remains outside config/). command:verify.sh runs
# `php -l` so a rewrite that broke the syntax is skipped. `compile`/`tests:affected`
# are DELIBERATELY OMITTED: on a non-Go repo the Go-build compile gate is a
# vacuous pass (sprint-023 contract). Real proof = detector-clears + php -l, gated
# by RequiredTools=["php"] for the CI skip.
[verify]
checks      = ["detector-clears", "command:verify.sh"]
interpreter = "sh"
