name        = "magic-number"
description = "Detects unexplained multi-digit numeric literals in expressions (excluding trivial single digits and const definitions) and proposes extracting a named constant; see detect.yml. Propose-only."
severity    = "low"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
