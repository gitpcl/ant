name        = "missing-await"
description = "Detects a goroutine spawned in a loop that is never awaited/synchronized (the Go analogue of a missing await — see detect.yml)"
severity    = "medium"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
