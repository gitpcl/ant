name        = "missing-context-timeout"
description = "Detects a network/DB call passed context.Background()/TODO() directly — no timeout or request-scoped context, so the call can hang forever; see detect.yml"
severity    = "medium"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
