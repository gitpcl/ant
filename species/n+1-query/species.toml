name        = "n+1-query"
description = "Detects a lookup/query call issued once per loop iteration (the N+1 query pattern) — see detect.yml"
severity    = "high"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
