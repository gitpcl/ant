name        = "nil-deref"
description = "Detects a pointer used from a fallible call whose error was discarded — a likely nil dereference (see detect.yml)"
severity    = "high"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
