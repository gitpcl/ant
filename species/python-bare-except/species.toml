name        = "python-bare-except"
description = "Flags a bare `except:` or a swallowed `except Exception: pass` that hides errors; propose-only"
severity    = "medium"
languages   = ["py"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

# LLM-assisted fix (templated on ignored-error): narrow the catch to the specific
# exception the block can raise and HANDLE it (log + re-raise, or return a typed
# error) instead of swallowing every exception (including KeyboardInterrupt /
# SystemExit for a bare `except:`). The right exception type and handling are a
# judgement the model makes from context, so the fix is propose-only.
[fix]
kind   = "llm"
prompt = "fix.md"

# detector-clears re-runs THIS rule over the patched scratch tree and requires
# zero matches (no bare except / swallowed Exception remains). command:verify.sh
# runs `python -m py_compile` so a rewrite that broke the syntax is skipped.
# `compile`/`tests:affected` are DELIBERATELY OMITTED: on a non-Go repo the
# Go-build compile gate is a vacuous pass (sprint-024 contract). Real proof =
# detector-clears + py_compile, gated by RequiredTools=["python3"] for the CI
# skip.
[verify]
checks      = ["detector-clears", "command:verify.sh"]
interpreter = "sh"
