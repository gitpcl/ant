name        = "redundant-else"
description = "Flattens an else that follows a terminating if-branch into a guard clause (drops the else, dedents its body)"
severity    = "low"
languages   = ["go"]
auto_apply  = true
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind      = "deterministic"
transform = "replace-match"

[verify]
checks = ["compile", "detector-clears"]
