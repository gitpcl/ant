name        = "resource-leak"
description = "Detects a function that opens a file/resource (os.Open) but never closes it on any path — a resource leak; see detect.yml"
severity    = "high"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
