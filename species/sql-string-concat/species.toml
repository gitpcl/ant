name        = "sql-string-concat"
description = "Detects a SQL query built by string concatenation (`db.Query(\"... \" + userVar)`) — the SQL-injection smell; the fix moves the interpolated value to a bound parameter. security-stage, propose-only; see detect.yml"
severity    = "high"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
