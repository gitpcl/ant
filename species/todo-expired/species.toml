name        = "todo-expired"
description = "Detects stale TODO/FIXME/HACK markers (dated TODOs, issue-referenced FIXMEs, HACK tags) and REPORTS them — report-only, no code change. Ships DISABLED by default (noisy in immature repos); enable per-project in ant.toml. See detect.yml."
severity    = "low"
languages   = ["go"]
auto_apply  = false
enabled     = false

[detector]
kind = "ast-grep"
rule = "detect.yml"

# REPORT-ONLY (Sprint 022 Finding 4, first-class via fix.kind = "none"). This
# species is detect-only: `ant scout` reports its findings and changes NOTHING in
# the working tree (TECHSPEC §2). It declares no [fix].transform and no
# [verify].checks because it proposes no change — `ant fix` rejects a report-only
# species with a clear message. (Earlier — Sprint 019 ENGINE-GAP #2 — the schema
# forced a fake deterministic [fix] + detector-clears [verify] workaround here;
# fix.kind="none" makes report-only a first-class manifest kind, so that hack is
# gone.)
[fix]
kind = "none"
