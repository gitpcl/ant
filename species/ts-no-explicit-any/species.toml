name        = "ts-no-explicit-any"
description = "Flags an explicit `any` type annotation in TypeScript; propose-only (llm narrows it to the inferred/precise type)"
severity    = "medium"
languages   = ["ts"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

# detector-clears re-runs THIS rule over the patched scratch tree and requires
# zero matches (no `any` annotation remains in the file). command:verify.sh runs
# `tsc --noEmit` so the narrowed type must still type-check — the real proof the
# replacement type is sound. compile/tests:affected are DELIBERATELY OMITTED — on
# a JS/TS repo the hardcoded Go-build compile gate is a vacuous pass (sprint-025
# contract). Real proof = detector-clears + tsc --noEmit, gated by
# RequiredTools=["node","tsc"] for the CI skip.
[verify]
checks      = ["detector-clears", "command:verify.sh"]
interpreter = "sh"
