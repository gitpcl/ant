name        = "unchecked-type-assertion"
description = "Detects a single-return type assertion (`x.(T)`) used without the comma-ok form — an unchecked cast that panics on the wrong dynamic type; see detect.yml"
severity    = "high"
languages   = ["go"]
auto_apply  = false
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind   = "llm"
prompt = "fix.md"

[verify]
checks = ["compile", "tests:affected", "detector-clears"]
