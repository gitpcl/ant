name        = "unreachable-code"
description = "Deletes a statement marked //ant:unreachable-code that follows a return/throw/break/continue"
severity    = "medium"
languages   = ["ts"]
auto_apply  = true
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind      = "deterministic"
transform = "delete-match"

[verify]
checks = ["compile", "detector-clears"]
