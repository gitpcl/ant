# Detector rule for the unused-import species (deterministic, ADR-0002).
#
# ast-grep is a SYNTACTIC matcher (TECHSPEC §2): it cannot itself prove an import
# is semantically unused. The species is safe because the verifier gate proves it
# — the deterministic delete-match fix removes the matched single-line import, and
# `compile` then rebuilds the patched tree. Go fails to compile on an unused
# import, so a clean compile after removal is the proof the import really was
# unused; a still-used import would make the post-fix tree fail compile and the
# fix is skipped (TECHSPEC §5.3, §8.1). `detector-clears` re-runs this rule over
# the patched tree and requires zero matches.
#
# The rule matches a TOP-LEVEL single-line import declaration: `import "pkg"`
# directly inside the source file (not a grouped `import ( ... )` block, whose
# specs live under import_spec_list). Constraining to source_file keeps the match
# at column 0 so the captured text equals the file's line verbatim — the
# deterministic delete-match fix deletes exactly that line.
id: unused-import
language: go
severity: warning
message: 'Imported package is never referenced and can be removed'
rule:
  pattern: import "$PKG"
  inside:
    kind: source_file
---
# Sprint 025 js-multilang-backfill: plain JavaScript has no compiler that proves an
# import unused (the Go doc above leans on `compile` for that), so the JS doc — like
# the deterministic cleanup species — targets an import the author EXPLICITLY MARKED
# removable with an `//ant:unused-import` doc comment. `language: javascript` fires
# on .js/.jsx. The deterministic delete-match fix removes the marked single-line
# import; detector-clears is the proof (on a JS repo `compile` is a vacuous Go-build
# pass, so the explicit marker plus detector-clears carries removal safety — the same
# gradient the TS unused-variable case uses).
id: unused-import-js
language: javascript
severity: warning
message: 'Import marked //ant:unused-import is never referenced and can be removed'
rule:
  pattern: import $WHAT from "$PKG"
  follows:
    kind: comment
    regex: 'ant:unused-import'
