name        = "unused-variable"
description = "Removes a variable declaration marked //ant:unused-variable that nothing references"
severity    = "low"
languages   = ["go", "ts"]
auto_apply  = true
enabled     = true

[detector]
kind = "ast-grep"
rule = "detect.yml"

[fix]
kind      = "deterministic"
transform = "delete-match"

[verify]
checks = ["compile", "detector-clears"]
